<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GML Data Management Team Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       RESET + TOKENS
    ========================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --burn: #FF8F60;
      --black: #131313;
      --pearl: #F2F1EF;
      --mint: #4DCFA7;
      --blue: #60AEFF;
      --yellow: #FFD881;
      --white: #fff;
      --border: #e5e3df;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--pearl);
      color: var(--black);
      font-size: 13px;
      line-height: 1.4;
    }

    /* =========================================================
       NAV
    ========================================================= */
    .nav {
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo {
      width: 28px;
      height: 28px;
      background: var(--burn);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #fff;
      font-size: 11px;
    }

    .nav-title {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-refresh {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #aaa;
      font-size: 11px;
    }

    .mint-dot {
      width: 7px;
      height: 7px;
      background: var(--mint);
      border-radius: 50%;
      display: inline-block;
    }

    .cached-time {
      color: #999;
      font-size: 11px;
    }

    .btn-refresh {
      background: var(--burn);
      color: #fff;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-refresh:hover {
      opacity: 0.85;
    }

    .btn-refresh:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* =========================================================
       TABS
    ========================================================= */
    .tab-bar {
      background: #1a1a1a;
      display: flex;
      padding: 0 20px;
      border-bottom: 1px solid #2a2a2a;
    }

    .tab-item {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s;
    }

    .tab-item.active {
      color: #fff;
      border-bottom-color: var(--burn);
    }

    /* =========================================================
       FILTER BAR
    ========================================================= */
    .filter-bar {
      background: #1a1a1a;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-label {
      color: #aaa;
      font-size: 12px;
    }

    .filter-input {
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
    }

    .filter-btn {
      background: #FF8F60;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    /* =========================================================
       MAIN
    ========================================================= */
    .main {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* =========================================================
       KPI BLOCK
    ========================================================= */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .kpi-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }

    .kpi-label {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .kpi-num {
      font-size: 38px;
      font-weight: 600;
      line-height: 1;
    }

    .kpi-num.burn {
      color: var(--burn);
    }

    .kpi-num.mint {
      color: var(--mint);
    }

    .kpi-sub {
      font-size: 10px;
      color: #999;
      margin-top: 6px;
    }

    .kpi-warn {
      font-size: 10px;
      font-weight: 600;
      color: #c0341a;
      margin-top: 4px;
    }

    .coverage-bar {
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      background: #f0f0f0;
    }

    .coverage-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s;
    }

    /* =========================================================
       HIGHLIGHT CARDS
    ========================================================= */
    .highlight-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .hl-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .hl-label {
      font-size: 9px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .hl-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hl-rate {
      font-size: 10px;
      color: var(--burn);
      font-weight: 600;
    }

    /* =========================================================
       SECTION / ACCORDION
    ========================================================= */
    .section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .section-header {
      background: var(--burn);
      padding: 11px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .section-title {
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-badge {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .section-arrow {
      color: #fff;
      font-size: 12px;
      transition: transform 0.2s;
    }

    .section-arrow.open {
      transform: rotate(180deg);
    }

    .section-body {
      display: none;
      padding: 0;
    }

    .section-body.open {
      display: block;
    }

    /* =========================================================
       TABLES
    ========================================================= */
    .tbl-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    thead tr {
      background: var(--black);
    }

    thead th {
      color: #fff;
      font-weight: 600;
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:nth-child(even) {
      background: #fafafa;
    }

    tbody tr:hover {
      background: #f5f3f0;
    }

    tbody td {
      padding: 7px 10px;
      vertical-align: middle;
    }

    .no-items {
      padding: 24px;
      text-align: center;
      color: #aaa;
      font-size: 12px;
    }

    /* =========================================================
       PILLS
    ========================================================= */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }

    .pill-good {
      background: #d4f5ea;
      color: #0e6e47;
    }

    .pill-neutral {
      background: #fff4d6;
      color: #a06800;
    }

    .pill-bad {
      background: #ffe4db;
      color: #c0341a;
    }

    .pill-scale {
      background: #dbeafe;
      color: #1e40af;
    }

    .pill-fix {
      background: #fff4d6;
      color: #a06800;
    }

    .pill-pause {
      background: #ffe4db;
      color: #c0341a;
    }

    .pill-au {
      background: #dbeafe;
      color: #1e40af;
      font-size: 9px;
      padding: 1px 6px;
      margin-left: 4px;
    }

    .badge-au {
      background: #60AEFF;
      color: #003d7a;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 5px;
      vertical-align: middle;
    }

    .badge-uk {
      background: #4DCFA7;
      color: #0a4a35;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* =========================================================
       DIVIDER
    ========================================================= */
    .divider-attention {
      text-align: center;
      padding: 18px 0;
      color: var(--burn);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .divider-attention::before,
    .divider-attention::after {
      content: '';
      display: inline-block;
      height: 1px;
      width: 80px;
      background: var(--burn);
      vertical-align: middle;
      margin: 0 10px;
      border-top: 1px dashed var(--burn);
    }

    /* =========================================================
       EMAIL CAPACITY
    ========================================================= */
    .capacity-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      padding: 16px;
    }

    .cap-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }

    .cap-name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .cap-big {
      font-size: 28px;
      font-weight: 600;
      color: var(--burn);
    }

    .cap-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #888;
      margin-top: 4px;
    }

    .cap-bar-wrap {
      height: 5px;
      border-radius: 3px;
      background: #f0f0f0;
      margin-top: 8px;
    }

    .cap-bar {
      height: 100%;
      border-radius: 3px;
    }

    /* =========================================================
       WARN SECTION
    ========================================================= */
    .warn-card {
      background: #fff7f4;
      border: 1px solid #ffd4c0;
      border-radius: 8px;
      margin: 12px;
      padding: 12px 14px;
    }

    .warn-title {
      font-size: 11px;
      font-weight: 600;
      color: #c0341a;
      margin-bottom: 8px;
    }

    /* =========================================================
       LOADING
    ========================================================= */
    .loading {
      text-align: center;
      padding: 60px;
      color: #aaa;
      font-size: 14px;
    }

    /* =========================================================
       PAGINATION
    ========================================================= */
    .pg-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 14px;
      background: #fff;
      border-top: 1px solid var(--border);
    }
    .pg-btn {
      background: var(--burn);
      color: #fff;
      border: none;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .pg-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .pg-btn:not(:disabled):hover {
      opacity: 0.85;
    }
    .pg-info {
      font-size: 11px;
      font-weight: 600;
      color: var(--black);
      min-width: 80px;
      text-align: center;
    }


    /* =========================================================
       PROSPECTOR BREAKDOWN
    ========================================================= */
    .pb-card-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .pb-prosp-card {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-width: 120px;
      text-align: center;
    }

    .pb-prosp-card:hover {
      border-color: var(--burn);
    }

    .pb-prosp-card.active {
      background: var(--burn);
      border-color: var(--burn);
      color: #fff;
    }

    .pb-prosp-card.active .pb-card-name {
      color: #fff;
    }

    .pb-prosp-card.active .pb-card-sent {
      color: rgba(255,255,255,0.8);
    }

    .pb-card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 4px;
    }

    .pb-card-sent {
      font-size: 11px;
      color: #888;
    }

    .pb-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .pb-stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .pb-stat-label {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .pb-stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--burn);
      line-height: 1;
    }

    .pb-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--black);
      padding: 10px 0 6px;
      margin-bottom: 4px;
      border-bottom: 2px solid var(--burn);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Two-column top layout: stats + capacity side by side */
    .pb-top-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .pb-top-stats {
      flex: 1;
    }
    .pb-top-stats .pb-stats-grid {
      margin-bottom: 0;
    }
    .pb-cap-panel {
      width: 220px;
      flex-shrink: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .pb-cap-panel .cap-big {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }
    .pb-cap-panel .cap-active-label {
      font-size: 10px;
      color: #aaa;
      margin-top: 2px;
      margin-bottom: 10px;
    }
    .pb-cap-panel .cap-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      padding: 3px 0;
      border-top: 1px solid #f0f0f0;
    }
    .pb-cap-panel .cap-bar-wrap {
      height: 6px;
      border-radius: 3px;
      background: #f0f0f0;
      margin-top: 10px;
    }
    .pb-cap-panel .cap-bar {
      height: 100%;
      border-radius: 3px;
    }

    .badge-overused {
      background: #fff3cd;
      color: #a06800;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge-healthy {
      background: #d4f5ea;
      color: #0e6e47;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .pb-zero-rate td {
      color: #c0341a !important;
      background: #fff5f3 !important;
    }

    .pb-loading {
      text-align: center;
      padding: 60px;
      color: #aaa;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .pb-card-row {
        flex-direction: column;
      }
      .pb-stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .pb-prosp-card {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <!-- =======================================================
       TOP NAV
  ======================================================== -->
  <nav class="nav">
    <div class="nav-left">
      <div class="nav-logo">GML</div>
      <span class="nav-title">GML — Data Management Team Dashboard</span>
    </div>

    <div class="nav-right">
      <div class="badge-refresh">
        <span class="mint-dot"></span>
        Auto-refresh every 1 Hour
      </div>

      <span class="cached-time" id="cachedTime">Loading...</span>

      <button class="btn-refresh" id="btnRefresh" onclick="refreshData()">
        &#8635; Refresh
      </button>
    </div>
  </nav>

  <!-- =======================================================
       TAB BAR
  ======================================================== -->
  <div class="tab-bar">
    <div class="tab-item active" id="tab-dashboard" onclick="switchTab('dashboard')">Data Management Team Dashboard</div>
    <div class="tab-item" id="tab-prosp-breakdown" onclick="switchTab('prosp-breakdown')">Prospector Breakdown</div>
  </div>

  <!-- =======================================================
       FILTER BAR
  ======================================================== -->
  <div class="filter-bar">
    <span class="filter-label">Date From</span>
    <input type="date" id="dateFrom" class="filter-input">

    <span class="filter-label">Date To</span>
    <input type="date" id="dateTo" class="filter-input">

    <button id="applyBtn" class="filter-btn" onclick="applyFilter()">
      Apply Filter
    </button>
  </div>

  <!-- =======================================================
       MAIN CONTENT
  ======================================================== -->
  <div class="main" id="mainContent">
    <div class="loading">Loading dashboard data...</div>
  </div>

  <!-- =======================================================
       PROSPECTOR BREAKDOWN PAGE
  ======================================================== -->
  <div class="main" id="pbContent" style="display:none;">
    <div class="pb-loading" id="pbLoading">Loading prospector data...</div>
    <div id="pbInner" style="display:none;">
      <!-- Prospector selector cards -->
      <div class="pb-card-row" id="pbCardRow"></div>
      <!-- Breakdown content -->
      <div id="pbDetail"></div>
    </div>
  </div>

  <script>
    // =========================================================
    // GLOBAL STATE
    // =========================================================
    var gData = null;
    var refreshTimer = null;

    // =========================================================
    // SMALL HELPERS
    // =========================================================
    function pill(status) {
      if (!status) return '';

      var map = {
        Good: 'pill-good',
        Neutral: 'pill-neutral',
        Bad: 'pill-bad',
        Scale: 'pill-scale',
        Fix: 'pill-fix',
        Pause: 'pill-pause'
      };

      var cls = map[status] || 'pill-neutral';
      return '<span class="pill ' + cls + '">' + status + '</span>';
    }

    function fmtRate(v) {
      return (v !== undefined && v !== null && v !== '') ? v + '%' : '—';
    }

    function fmtN(v) {
      return (v !== undefined && v !== null) ? v : 0;
    }

    function auPill(isAU) {
      return isAU ? '<span class="pill pill-au">AU</span>' : '';
    }

    function cleanNicheName(name) {
    if (!name) return name;
    if (/^AU\s*-\s*/i.test(name)) return name.replace(/^AU\s*-\s*/i, '').trim();
    if (/^UK\s*-\s*/i.test(name)) return name.replace(/^UK\s*-\s*/i, '').trim();
   return name.trim();
    }

    function getNicheBadge(name) {
   if (!name) return '';
   if (/^AU\s*-\s*/i.test(name)) return '<span class="badge-au">AU</span>';
    if (/^UK\s*-\s*/i.test(name)) return '<span class="badge-uk">UK</span>';
    return '';
    }

    function coverageColor(pct) {
      if (pct >= 80) return 'var(--mint)';
      if (pct >= 50) return 'var(--yellow)';
      return '#ef4444';
    }

    // =========================================================
    // SECTION / ACCORDION HELPERS
    // =========================================================
    function section(id, icon, title, bodyHtml, count) {
      var badge = count !== undefined
        ? '<span class="section-badge">' + count + '</span>'
        : '';

      return ''
        + '<div class="section">'
        +   '<div class="section-header" onclick="toggleSection(\'' + id + '\')">'
        +     '<div class="section-title">' + icon + ' ' + title + badge + '</div>'
        +     '<span class="section-arrow open" id="arr_' + id + '">&#9660;</span>'
        +   '</div>'
        +   '<div class="section-body open" id="body_' + id + '">' + bodyHtml + '</div>'
        + '</div>';
    }

    // =========================================================
    // PAGINATION
    // =========================================================
    var ROWS_PER_PAGE = 5;

    function initPagination(tableId) {
      var tbl = document.getElementById(tableId);
      if (!tbl) return;
      var tbody = tbl.querySelector('tbody');
      if (!tbody) return;
      var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
      var total = rows.length;
      if (total <= ROWS_PER_PAGE) return; // no pagination needed

      var totalPages = Math.ceil(total / ROWS_PER_PAGE);
      var currentPage = 1;

      function showPage(page) {
        currentPage = page;
        var start = (page - 1) * ROWS_PER_PAGE;
        var end = start + ROWS_PER_PAGE;
        rows.forEach(function(r, i) {
          r.style.display = (i >= start && i < end) ? '' : 'none';
        });
        var prevBtn = document.getElementById('pg-prev-' + tableId);
        var nextBtn = document.getElementById('pg-next-' + tableId);
        var infoEl  = document.getElementById('pg-info-' + tableId);
        if (prevBtn) prevBtn.disabled = (page === 1);
        if (nextBtn) nextBtn.disabled = (page === totalPages);
        if (infoEl)  infoEl.textContent = 'Page ' + page + ' of ' + totalPages;
      }

      // Build controls container
      var controls = document.createElement('div');
      controls.className = 'pg-controls';
      controls.id = 'pg-' + tableId;

      var prevBtn = document.createElement('button');
      prevBtn.id = 'pg-prev-' + tableId;
      prevBtn.className = 'pg-btn';
      prevBtn.textContent = '\u2190 Previous';
      prevBtn.onclick = function() { if (currentPage > 1) showPage(currentPage - 1); };

      var infoEl = document.createElement('span');
      infoEl.id = 'pg-info-' + tableId;
      infoEl.className = 'pg-info';

      var nextBtn = document.createElement('button');
      nextBtn.id = 'pg-next-' + tableId;
      nextBtn.className = 'pg-btn';
      nextBtn.textContent = 'Next \u2192';
      nextBtn.onclick = function() { if (currentPage < totalPages) showPage(currentPage + 1); };

      controls.appendChild(prevBtn);
      controls.appendChild(infoEl);
      controls.appendChild(nextBtn);

      // Insert controls after the tbl-wrap div
      var wrap = tbl.closest('.tbl-wrap') || tbl.parentNode;
      wrap.parentNode.insertBefore(controls, wrap.nextSibling);

      showPage(1);
    }

    function initAllPagination() {

    // =========================================================
    // DATA ACTIONS
    // =========================================================
    function applyFilter() {
  var from = document.getElementById('dateFrom').value;
  var to   = document.getElementById('dateTo').value;
  var btn  = document.getElementById('applyBtn');

  pbLoaded = false; pbData = null; pbSelectedProsp = null;
  if (btn) { btn.textContent = 'Applying...'; btn.disabled = true; }

  fetch(API_URL + '?action=getData&dateFrom=' + encodeURIComponent(from) + '&dateTo=' + encodeURIComponent(to))
    .then(function(res) { return res.json(); })
    .then(function(data) {
      render(data);
      if (activeTab === 'prosp-breakdown') renderProspectorBreakdown(data.prospectors);
      if (btn) { btn.textContent = 'Apply Filter'; btn.disabled = false; }
      scheduleRefresh();
    })
    .catch(function(err) {
      if (btn) { btn.textContent = 'Apply Filter'; btn.disabled = false; }
      console.error('Filter error:', err);
    });
}


   function refreshData() {
  var from = document.getElementById('dateFrom').value;
  var to   = document.getElementById('dateTo').value;
  var btn  = document.getElementById('btnRefresh');

  if (btn) { btn.textContent = 'Refreshing...'; btn.disabled = true; }

  fetch(API_URL + '?action=getDataFresh&dateFrom=' + encodeURIComponent(from) + '&dateTo=' + encodeURIComponent(to))
    .then(function(res) { return res.json(); })
    .then(function(data) {
      render(data);
      if (activeTab === 'prosp-breakdown') renderProspectorBreakdown(data.prospectors);
      if (btn) { btn.textContent = '↺ Refresh'; btn.disabled = false; }
      scheduleRefresh();
    })
    .catch(function(err) {
      if (btn) { btn.textContent = '↺ Refresh'; btn.disabled = false; }
      console.error('Refresh error:', err);
    });
}

    function scheduleRefresh() {
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(refreshData, 15 * 60 * 1000);
    }

    // =========================================================
    // INITIAL LOAD
    // =========================================================
    window.addEventListener('load', function() {
      var now = new Date();
      var firstDay = new Date(now.getFullYear(), now.getMonth(), 1);

      var pad = function(n) {
        return n < 10 ? '0' + n : String(n);
      };

      document.getElementById('dateFrom').value =
        now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(firstDay.getDate());

      document.getElementById('dateTo').value =
        now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());

      applyFilter();
    });

    // =========================================================
    var activeTab = 'dashboard';

    function switchTab(tabId) {
      activeTab = tabId;

      // Update tab button styles
      var tabs = ['dashboard', 'prosp-breakdown'];
      tabs.forEach(function(t) {
        var el = document.getElementById('tab-' + t);
        if (el) {
          el.classList.toggle('active', t === tabId);
        }
      });

      // Show/hide pages
      var mainContent  = document.getElementById('mainContent');
      var pbContent    = document.getElementById('pbContent');
      if (mainContent) mainContent.style.display = (tabId === 'dashboard') ? '' : 'none';
      if (pbContent)   pbContent.style.display   = (tabId === 'prosp-breakdown') ? '' : 'none';

      // If switching to PB tab and data not yet loaded, load it
      if (tabId === 'prosp-breakdown') {
        loadProspectorBreakdown();
      }

    function loadProspectorBreakdown() {
  var pbLoading = document.getElementById('pbLoading');
  var pbInner   = document.getElementById('pbInner');

  if (!gData || !gData.prospectors || !gData.prospectors.length) {
    if (pbLoading) { pbLoading.style.display = 'block'; pbLoading.textContent = 'No prospector data found for this date range.'; }
    if (pbInner)   pbInner.style.display = 'none';

  if (pbInner)   pbInner.style.display = 'block';

  renderProspectorBreakdown(gData.prospectors);

    // =========================================================
    // PROSPECTOR BREAKDOWN — RENDER
    // =========================================================
    function renderPBPage(data) {
      var bd = data.breakdown || [];
      if (!bd.length) {
        var loadingEl = document.getElementById('pbLoading');
        if (loadingEl) { loadingEl.style.display = 'block'; loadingEl.textContent = 'No prospector data for this date range.'; }
        return;
      }

      var innerEl = document.getElementById('pbInner');
      if (innerEl) innerEl.style.display = 'block';

      // Build prospector cards
      var cardRow = document.getElementById('pbCardRow');
      if (cardRow) {
        cardRow.innerHTML = '';
        bd.forEach(function(p) {
          var card = document.createElement('div');
          card.className = 'pb-prosp-card' + (pbSelectedProsp === p.name ? ' active' : '');
          card.id = 'pbcard-' + p.name.replace(/\s+/g, '-');
          card.innerHTML =
            '<div class="pb-card-name">' + esc(p.name) + '</div>' +
            '<div class="pb-card-sent">' + p.totalSent + ' campaigns created</div>';
          card.onclick = (function(name) {
            return function() { selectPBProspector(name, data); };
          })(p.name);
          cardRow.appendChild(card);
        });
      }

      // Auto-select first or previously selected
      var toSelect = pbSelectedProsp || (bd.length ? bd[0].name : null);
      if (toSelect) selectPBProspector(toSelect, data);
    }

    function selectPBProspector(name, data) {
      pbSelectedProsp = name;
      var bd = data.breakdown || [];

      // Update card active state
      bd.forEach(function(p) {
        var card = document.getElementById('pbcard-' + p.name.replace(/\s+/g, '-'));
        if (card) card.classList.toggle('active', p.name === name);
      });

      var prosp = null;
      for (var i = 0; i < bd.length; i++) {
        if (bd[i].name === name) { prosp = bd[i]; break; }
      }
      if (!prosp) return;

      var detail = document.getElementById('pbDetail');
      if (!detail) return;
      detail.innerHTML = renderPBDetail(prosp);
      initAllPagination();
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderPBDetail(p) {
      var html = '';

      // ── Summary Stats ──────────────────────────────────────
      html += '<div class="pb-top-row"><div class="pb-top-stats"><div class="pb-stats-grid">';

    html += pbStat('Total Emails Launched', p.totalLaunchEmails || 0);

      html += pbStat('Niches Covered', p.nicheCount);
      html += '</div></div>';
      // ── Email Capacity (right panel) ──────────────────────

          html +=   '<div class="cap-row"><span>Other</span><span><strong>' + capRow.other + '</strong></span></div>';
          html +=   '<div class="cap-row"><span>Capacity Used</span><span><strong>' + capRow.capacityPct + '%</strong></span></div>';
          html +=   '<div class="cap-bar-wrap"><div class="cap-bar" style="width:' + Math.min(capRow.capacityPct, 100) + '%;background:' + col + '"></div></div>';
          html += '</div>';
        }
      }
      html += '</div>';

      // ── Emails Used ────────────────────────────────────────
      html += '<div class="pb-section-title">📧 Emails Used</div>';
      if (p.emailRows && p.emailRows.length) {
        html += '<div class="tbl-wrap"><table data-paginate="true" id="tbl-pb-emails-' + p.name.replace(/\s+/g,'-') + '">';
        html += '<thead><tr>';
        html += '<th>Email Address</th><th>Times Used</th><th>Niches Sent To</th><th>Reply Rate</th><th>Status</th>';
        html += '</tr></thead><tbody>';
        p.emailRows.forEach(function(e) {
          var badge = e.overused
            ? '<span class="badge-overused">Overused</span>'
            : '<span class="badge-healthy">Healthy</span>';
          html += '<tr>';
          html += '<td>' + esc(e.emailAddress) + '</td>';
          html += '<td>' + e.timesUsed + '</td>';
          html += '<td>' + esc(e.niches) + '</td>';
          html += '<td>' + e.replyRate + '%</td>';
          html += '<td>' + badge + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      } else {
        html += '<div class="no-items">No email data</div>';
      }

      // ── Niche Breakdown ────────────────────────────────────
      html += '<div class="pb-section-title" style="margin-top:16px;">🗂 Niche Breakdown</div>';
      if (p.nicheRows && p.nicheRows.length) {
        html += '<div class="tbl-wrap"><table data-paginate="true" id="tbl-pb-niches-' + p.name.replace(/\s+/g,'-') + '">';
        html += '<thead><tr>';
        html += '<th>Niche</th><th>Total Campaigns Created</th><th>Total Emails Launched</th><th>Replies</th><th>Reply Rate</th><th>Positive</th><th>Negative</th>';
        html += '</tr></thead><tbody>';
        p.nicheRows.forEach(function(n) {
          var rowClass = n.replyRate === 0 ? ' class="pb-zero-rate"' : '';
          html += '<tr' + rowClass + '>';
          html += '<td>' + cleanNicheName(n.niche) + getNicheBadge(n.niche) + '</td>';
          html += '<td>' + n.sent + '</td>';
        html += '<td>' + (n.launchEmails || 0) + '</td>';
        html += '<td>' + n.replies + '</td>';
          html += '<td>' + n.replyRate + '%</td>';
          html += '<td>' + n.positive + '</td>';
          html += '<td>' + n.negative + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      } else {
        html += '<div class="no-items">No niche data</div>';
      }

      return html;
    }

    function pbStat(label, value) {
      return '<div class="pb-stat-card">' +
        '<div class="pb-stat-label">' + esc(label) + '</div>' +
        '<div class="pb-stat-value">' + esc(String(value)) + '</div>' +
        '</div>';
    }

    function renderProspectorBreakdown(prospectors) {
  var pbLoading = document.getElementById('pbLoading');
  var pbInner   = document.getElementById('pbInner');
  var cardRow   = document.getElementById('pbCardRow');

  if (!prospectors || !prospectors.length) {
    if (pbLoading) { pbLoading.style.display = 'block'; pbLoading.textContent = 'No prospector data found for this date range.'; }
    if (pbInner)   pbInner.style.display = 'none';
    return;
  }

  if (pbLoading) pbLoading.style.display = 'none';
  if (pbInner)   pbInner.style.display = 'block';

  if (cardRow) {
    cardRow.innerHTML = '';
    prospectors.forEach(function(p) {
      var card = document.createElement('div');
      card.className = 'pb-prosp-card' + (pbSelectedProsp === p.name ? ' active' : '');
      card.id = 'pbcard-' + p.name.replace(/\s+/g, '-');
      card.innerHTML =
        '<div class="pb-card-name">' + esc(p.name) + '</div>' +
        '<div class="pb-card-sent">' + p.sent + ' campaigns created</div>';
      card.onclick = (function(name) {
        return function() { selectPBFromProspectors(name); };
      })(p.name);
      cardRow.appendChild(card);
    });
  }

  var toSelect = pbSelectedProsp || (prospectors.length ? prospectors[0].name : null);
  if (toSelect) selectPBFromProspectors(toSelect);
}

function selectPBFromProspectors(name) {
  pbSelectedProsp = name;
  var prospectors = gData.prospectors || [];

  prospectors.forEach(function(p) {
    var card = document.getElementById('pbcard-' + p.name.replace(/\s+/g, '-'));
    if (card) card.classList.toggle('active', p.name === name);
  });

  var prosp = null;
  for (var i = 0; i < prospectors.length; i++) {
    if (prospectors[i].name === name) { prosp = prospectors[i]; break; }
  }
  if (!prosp) return;

  // Fix: _rawCampaignsByProspector is an array of {name, rows}, not a plain object
  var rawEntry = (gData._rawCampaignsByProspector || []).filter(function(p) { return p.name === name; })[0];
  var campaigns = rawEntry ? rawEntry.rows : [];

  // Build niche rows
  var nicheMap = {};
  campaigns.forEach(function(c) {
    var niche = String(c.niche || '').trim() || 'Unknown';
    if (!nicheMap[niche]) nicheMap[niche] = { niche: niche, sent: 0, launchEmails: 0, replies: 0, positive: 0, negative: 0 };
    nicheMap[niche].sent++;
    nicheMap[niche].launchEmails += (c.launchEmails || 0);
    var st = String(c.status || '').toLowerCase();
    if (st === 'completed') nicheMap[niche].replies++;
    if (st === 'active')    nicheMap[niche].positive++;
  });
  var nicheRows = Object.keys(nicheMap).map(function(n) {
    var r = nicheMap[n];
    r.negative = Math.max(0, r.sent - r.replies - r.positive);
    r.replyRate = r.sent ? Math.round((r.replies / r.sent) * 100) : 0;
    return r;
  }).sort(function(a, b) { return b.sent - a.sent; });

  // Build email rows from campaign emailAddress field
  var emailMap = {};
  campaigns.forEach(function(c) {
    var email = String(c.emailAddress || '').trim();
    if (!email) return;
    if (!emailMap[email]) emailMap[email] = { emailAddress: email, timesUsed: 0, nicheSet: {}, replies: 0, sent: 0 };
    emailMap[email].timesUsed++;
    emailMap[email].sent++;
    if (c.niche) emailMap[email].nicheSet[c.niche] = true;
    if (String(c.status || '').toLowerCase() === 'completed') emailMap[email].replies++;
  });
  var emailRows = Object.keys(emailMap).map(function(email) {
    var e = emailMap[email];
    return {
      emailAddress: e.emailAddress,
      timesUsed: e.timesUsed,
      niches: Object.keys(e.nicheSet).sort().join(', '),
      replyRate: e.sent ? Math.round((e.replies / e.sent) * 100) : 0,
      overused: e.timesUsed >= 3
    };
  }).sort(function(a, b) { return b.timesUsed - a.timesUsed; });

  var p = {
    name:              prosp.name,
    totalSent:         prosp.sent         || 0,
    totalLaunchEmails: prosp.launchEmails || 0,
    totalReplies:      prosp.replies      || 0,
    overallReplyRate:  prosp.replyRate    || 0,
    uniqueEmails:      emailRows.length,
    nicheCount:        nicheRows.length,
    emailRows:         emailRows,
    nicheRows:         nicheRows
  };

  var detail = document.getElementById('pbDetail');
  if (!detail) return;
  detail.innerHTML = renderPBDetail(p);
  initAllPagination();
}

  </script>
</body>
